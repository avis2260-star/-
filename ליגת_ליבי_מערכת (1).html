function StatPill({ value, label, color = '#FF6B1A', icon }) {
  return (

}

function TableView({ data, title, icon }) {
  return (
    <div style={S.card}>

      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
        <thead>

            {['#','קבוצה','מ\'','נ\'','ה\'','זכות','חובה','+/-','טכ','נקודות'].map(h => (
              <th key={h} style={{ padding: '9px 12px', color: '#4a6a8a', fontWeight: 600, fontSize: 11, textAlign: h === 'קבוצה' ? 'right' : 'center', borderBottom: '1px solid rgba(255,255,255,0.05)' }}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {data.map((t, i) => (
            <tr key={t.name} style={{ borderBottom: '1px solid rgba(255,255,255,0.04)', background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.015)', transition: 'background 0.2s' }}
              onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,107,26,0.06)'}
              onMouseLeave={e => e.currentTarget.style.background = i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.015)'}
            >
              <td style={{ padding: '10px 12px', textAlign: 'center' }}>
                <span style={{ fontWeight: 700, color: t.rank === 1 ? '#e0c97a' : t.rank === 2 ? '#b0b8c8' : t.rank === 3 ? '#c87d3a' : '#4a6a8a', fontSize: 14 }}>{t.rank}</span>
              </td>
              <td style={{ padding: '10px 12px', fontWeight: 600, color: '#e8edf5' }}>{t.name}</td>
              <td style={{ padding: '10px 12px', textAlign: 'center', color: '#8aaac8' }}>{t.games}</td>
              <td style={{ padding: '10px 12px', textAlign: 'center', color: '#4ec97a', fontWeight: 600 }}>{t.wins}</td>
              <td style={{ padding: '10px 12px', textAlign: 'center', color: '#e05a5a', fontWeight: 600 }}>{t.losses}</td>
              <td style={{ padding: '10px 12px', textAlign: 'center', color: '#8aaac8' }}>{t.pf}</td>
              <td style={{ padding: '10px 12px', textAlign: 'center', color: '#8aaac8' }}>{t.pa}</td>
              <td style={{ padding: '10px 12px', textAlign: 'center', color: t.diff > 0 ? '#4ec97a' : '#e05a5a', fontWeight: 600 }}>{t.diff > 0 ? '+' : ''}{t.diff}</td>

              <td style={{ padding: '10px 12px', textAlign: 'center', fontWeight: 900, color: '#FF6B1A', fontSize: 15 }}>{t.pts}</td>

    </div>
  );
}

                      <span style={{ fontWeight: 900, color: '#FF6B1A', margin: '0 14px' }}>{winScore}</span>
                      <span style={{ color: '#4a6a8a' }}>{loseTeam}</span>
                      <span style={{ fontWeight: 900, color: '#5a7a9a', margin: '0 14px' }}>{loseScore}</span>
                    </td>
                    <td style={{ padding: '9px 14px', textAlign: 'center', fontWeight: 900, color: '#4ec97a', whiteSpace: 'nowrap' }}>+{diff}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div style={S.card}>
          <div style={S.cardHeader}>😰 תבוסות גדולות</div>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: 'rgba(255,255,255,0.03)' }}>
                <th colSpan={3} style={{ padding: '8px 14px', textAlign: 'right', color: '#4a6a8a', fontSize: 11 }}>מפסיד · תוצאה · מנצח</th>
                <th style={{ padding: '8px 14px', textAlign: 'center', color: '#4a6a8a', fontSize: 11 }}>הפרש</th>
              </tr>
            </thead>
            <tbody>
              {worstDeficits.slice(0, 8).map((g, i) => {
                const homeWins = g.sh > g.sa;
                const loseTeam = homeWins ? g.away : g.home;
                const winTeam = homeWins ? g.home : g.away;
                const loseScore = homeWins ? g.sa : g.sh;
                const winScore = homeWins ? g.sh : g.sa;
                const diff = winScore - loseScore;
                return (
                  <tr key={i} style={{ borderBottom: '1px solid rgba(255,255,255,0.04)' }}>
                    <td colSpan={3} style={{ padding: '9px 14px', fontSize: 12 }}>
                      <span style={{ fontWeight: 700, color: '#e05a5a' }}>{loseTeam}</span>
                      <span style={{ fontWeight: 900, color: '#5a7a9a', margin: '0 14px' }}>{loseScore}</span>
                      <span style={{ color: '#4a6a8a' }}>{winTeam}</span>
                      <span style={{ fontWeight: 900, color: '#4ec97a', margin: '0 14px' }}>{winScore}</span>
                    </td>
                    <td style={{ padding: '9px 14px', textAlign: 'center', fontWeight: 900, color: '#e05a5a', whiteSpace: 'nowrap' }}>-{diff}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div style={S.card}>
          <div style={S.cardHeader}>⚡ משחקים צמודים (הפרש של 1)</div>
          <div style={{ padding: 12 }}>
            {realGames.filter(g => Math.abs(g.sh - g.sa) === 1).map((g, i) => (
              <div key={i} style={{ padding: '10px 8px', borderBottom: '1px solid rgba(255,255,255,0.04)', display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ fontSize: 12, color: '#4a6a8a', whiteSpace: 'nowrap' }}>מ'{g.round}</div>
                <div style={{ flex: 1, fontSize: 13 }}>
                  <span style={{ fontWeight: 600, color: g.sh > g.sa ? '#e8edf5' : '#5a7a9a' }}>{g.home}</span>
                  <span style={{ fontWeight: 900, color: g.sh > g.sa ? '#FF6B1A' : '#5a7a9a', margin: '0 14px' }}>{g.sh}</span>
                  <span style={{ fontWeight: 600, color: g.sa > g.sh ? '#e8edf5' : '#5a7a9a' }}>{g.away}</span>
                  <span style={{ fontWeight: 900, color: g.sa > g.sh ? '#FF6B1A' : '#5a7a9a', margin: '0 0 0 14px' }}>{g.sa}</span>
                </div>
                <div style={{ background: 'rgba(255,107,26,0.15)', color: '#FF6B1A', borderRadius: 6, padding: '2px 8px', fontSize: 11, fontWeight: 700 }}>הפרש 1</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
